<aside class="sidebar">
  <div class="brand-row">
    <div class="brand-mark">I</div>
    <div>
      <p class="brand-label">ISMS</p>
      <strong class="brand-name">Command Center</strong>
    </div>
  </div>

  <label class="sidebar-search" for="search-input">
    <span class="visually-hidden">Search workspace records</span>
    <span class="search-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" focusable="false">
        <circle cx="11" cy="11" r="6.5"></circle>
        <path d="M16 16l5 5"></path>
      </svg>
    </span>
    <input id="search-input" type="search" placeholder="{{ search_placeholder|default:'Search controls or policies' }}">
  </label>

  <nav class="sidebar-nav">
    <a class="nav-link{% if active_page == 'home' %} is-active{% endif %}" href="{% url 'portal-home' %}">Home</a>
    {% if current_user.isStaff %}
    <a class="nav-link{% if active_page == 'assessments' %} is-active{% endif %}" href="{% url 'portal-assessments' %}">Assessments</a>
    {% endif %}
    <a class="nav-link{% if active_page == 'controls' %} is-active{% endif %}" href="{% url 'portal-controls' %}">Controls</a>
    <a class="nav-link{% if active_page == 'reviews' %} is-active{% endif %}" href="{% url 'portal-reviews' %}">Reviews</a>
    <a class="nav-link{% if active_page == 'audit-log' %} is-active{% endif %}" href="{% url 'portal-audit-log' %}">Audit Log</a>
    <a class="nav-link{% if active_page == 'policies' %} is-active{% endif %}" href="{% url 'portal-policies' %}">Policies</a>
    <a class="nav-link{% if active_page == 'risks' %} is-active{% endif %}" href="{% url 'portal-risks' %}">Risk Register</a>
    <a class="nav-link{% if active_page == 'vendors' %} is-active{% endif %}" href="{% url 'portal-vendors' %}">Vendors</a>
  </nav>

  <div class="sidebar-group">
    <p class="sidebar-heading">Framework</p>
    <div class="sidebar-chip">ISO 27001:2022</div>
  </div>
</aside>
