{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ISMS Zero Trust Assessment</title>
  <link rel="stylesheet" href="{% static 'styles.css' %}">
</head>
<body>
  <div class="app-shell">
      {% include "portal/_sidebar.html" with active_page="zero-trust" search_placeholder="Search controls or policies" %}

    <section class="main-shell">
      <header class="topbar">
        <div class="workspace-switcher">
          <div class="workspace-icon">A</div>
          <div>
            <p class="workspace-label">Workspace</p>
            <strong>Acme Co / ISO Program</strong>
          </div>
        </div>
        <div class="topbar-actions">
          {% include "portal/_auth_controls.html" %}
        </div>
      </header>

      <main class="content">
        <section class="page-grid">
          <article class="panel">
            <a
              class="zero-trust-doc-link"
              href="https://learn.microsoft.com/en-us/security/zero-trust/assessment/get-started"
              target="_blank"
              rel="noopener noreferrer"
            >
              Zero Trust Assessment required Microsoft Graph permissions
            </a>
          </article>
        </section>
      </main>
    </section>
  </div>
</body>
</html>
